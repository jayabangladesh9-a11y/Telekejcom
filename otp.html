<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Verify OTP - Bondhu Telecom</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .otp-container {
            width: 100%;
            max-width: 450px;
            background-color: #fff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.4s ease;
            will-change: transform, opacity;
        }

        .slide-out {
            transform: translateX(-100%);
            opacity: 0;
            pointer-events: none;
        }

        .otp-header {
            background: linear-gradient(rgba(6, 117, 45, 0.6), rgba(6, 117, 45, 0.6)), url('1.jpg');
            background-size: cover;
            background-position: center;
            height: 180px;
            padding: 20px;
            color: white;
            text-align: center;
            border-bottom-left-radius: 40px;
            border-bottom-right-radius: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .app-logo {
            width: 60px;
            height: 60px;
            background: white;
            border-radius: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 10px;
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .app-logo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .otp-header h2 {
            font-size: 20px;
            font-weight: 700;
        }

        .otp-card {
            background: white;
            margin: -35px 20px 0;
            padding: 25px 15px;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.08);
            z-index: 10;
            flex-grow: 1;
            text-align: center;
        }

        .instruction-text {
            font-size: 13px;
            color: #666;
            line-height: 1.6;
            margin-bottom: 25px;
            padding: 0 10px;
        }

        .otp-inputs {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 25px;
        }

        .otp-inputs input {
            width: 45px;
            height: 50px;
            text-align: center;
            font-size: 20px;
            font-weight: 700;
            border: 2px solid #f1f5f9;
            background: #f1f5f9;
            border-radius: 10px;
            color: #06752d;
            transition: all 0.3s;
            outline: none;
            /* Remove arrows from number input */
            -moz-appearance: textfield;
        }

        .otp-inputs input::-webkit-outer-spin-button,
        .otp-inputs input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .otp-inputs input:focus {
            border-color: #06752d;
            background: #fff;
            box-shadow: 0 0 10px rgba(6, 117, 45, 0.1);
        }

        .timer-box {
            font-size: 13px;
            color: #666;
            margin-bottom: 20px;
        }

        .timer-box span {
            color: #d32f2f;
            font-weight: 700;
        }

        .verify-btn {
            background: linear-gradient(135deg, #06752d 0%, #0a9139 100%);
            color: white;
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(6, 117, 45, 0.2);
            transition: all 0.3s;
        }

        .resend-link {
            margin-top: 20px;
            font-size: 13px;
            color: #666;
        }

        .resend-link a {
            color: #06752d;
            text-decoration: none;
            font-weight: 700;
            pointer-events: none;
            opacity: 0.5;
        }

        .resend-link a.active {
            pointer-events: auto;
            opacity: 1;
            cursor: pointer;
        }

        @keyframes pulse-click {
            0% { transform: scale(1); }
            50% { transform: scale(0.92); }
            100% { transform: scale(1); }
        }

        .pulse-effect {
            animation: pulse-click 0.3s ease-out;
        }

        .copyright-text {
            text-align: center;
            font-size: 11px;
            color: #888;
            padding: 15px 10px;
        }

        @media screen and (max-width: 480px) {
            .otp-container { max-width: 100%; height: 100vh; }
            .otp-inputs input { width: 42px; height: 48px; }
        }
    </style>
</head>
<body>

    <div class="otp-container" id="otpApp">
        <div class="otp-header">
            <div class="app-logo">
                <img src="3.png" alt="Logo">
            </div>
            <h2>Verify Account</h2>
            <p style="font-size: 11px; opacity: 0.9;">Enter the 6-digit code sent to you</p>
        </div>

        <div class="otp-card">
            <p class="instruction-text">
                আমরা আপনার মোবাইলে/ইমেইলে একটি ৬-সংখ্যার কোড পাঠিয়েছি। সেটি নিচে লিখুন।
            </p>

            <div class="otp-inputs" id="otpBox">
                <input type="number" pattern="\d*" inputmode="numeric" maxlength="1" onkeyup="moveNext(this, 0, event)">
                <input type="number" pattern="\d*" inputmode="numeric" maxlength="1" onkeyup="moveNext(this, 1, event)">
                <input type="number" pattern="\d*" inputmode="numeric" maxlength="1" onkeyup="moveNext(this, 2, event)">
                <input type="number" pattern="\d*" inputmode="numeric" maxlength="1" onkeyup="moveNext(this, 3, event)">
                <input type="number" pattern="\d*" inputmode="numeric" maxlength="1" onkeyup="moveNext(this, 4, event)">
                <input type="number" pattern="\d*" inputmode="numeric" maxlength="1" onkeyup="moveNext(this, 5, event)">
            </div>

            <div class="timer-box">
                Code expires in: <span id="timer">02:00</span>
            </div>

            <button class="verify-btn" onclick="verifyOTP(this)">Verify & Proceed</button>

            <div class="resend-link">
                Didn't receive code? <a href="#" id="resendBtn" onclick="resendCode()">Resend Now</a>
            </div>
        </div>

        <div class="copyright-text">
            © 2026 Bondhu Telecom | All Rights Reserved
        </div>
    </div>

    <script>
        const inputs = document.querySelectorAll('.otp-inputs input');

        function moveNext(current, index, event) {
            const val = current.value;

            // Handle backspace
            if (event.key === "Backspace" || event.keyCode === 8) {
                if (index > 0) {
                    inputs[index - 1].focus();
                }
                return;
            }

            // Clean input to ensure only 1 digit
            if (val.length > 1) {
                current.value = val.slice(0, 1);
            }

            if (val !== "" && index < 5) {
                // Move to next input
                inputs[index + 1].focus();
            } else if (val !== "" && index === 5) {
                // Last input filled: hide keyboard
                current.blur();
            }
        }

        // Prevent typing more than 1 char per box
        inputs.forEach(input => {
            input.addEventListener('input', function() {
                if (this.value.length > 1) {
                    this.value = this.value.slice(0, 1);
                }
            });
        });

        // Timer Logic
        let timeLeft = 120;
        const timerElement = document.getElementById('timer');
        const resendBtn = document.getElementById('resendBtn');

        const countdown = setInterval(() => {
            if (timeLeft <= 0) {
                clearInterval(countdown);
                timerElement.innerText = "00:00";
                resendBtn.classList.add('active');
            } else {
                let minutes = Math.floor(timeLeft / 60);
                let seconds = timeLeft % 60;
                timerElement.innerText = `${minutes < 10 ? '0' : ''}${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;
                timeLeft--;
            }
        }, 1000);

        function verifyOTP(element) {
            let otp = "";
            inputs.forEach(input => otp += input.value);

            if (otp.length < 6) {
                alert('দয়া করে ৬ সংখ্যার ওটিপি কোডটি লিখুন!');
                return;
            }

            element.classList.add('pulse-effect');
            setTimeout(() => {
                element.classList.remove('pulse-effect');
                document.getElementById('otpApp').classList.add('slide-out');
                setTimeout(() => {
                    window.location.href = 'reset-pin.html';
                }, 500);
            }, 300);
        }

        function resendCode() {
            alert('আপনার মোবাইলে নতুন কোড পাঠানো হয়েছে!');
            location.reload();
        }
    </script>
</body>
</html>
