<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login - Bondhu Telecom</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .login-container {
            width: 100%;
            max-width: 450px;
            background-color: #fff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        /* Top Header Style matching your app */
        .login-header {
            background: linear-gradient(135deg, #06752d 0%, #0a9139 100%);
            height: 250px;
            padding: 30px 20px;
            color: white;
            text-align: center;
            border-bottom-left-radius: 40px;
            border-bottom-right-radius: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .app-logo {
            width: 70px;
            height: 70px;
            background: white;
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 15px;
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
        }

        .app-logo i {
            font-size: 35px;
            color: #06752d;
        }

        .login-header h2 {
            font-size: 22px;
            font-weight: 700;
        }

        .login-header p {
            font-size: 13px;
            opacity: 0.9;
            margin-top: 5px;
        }

        /* Form Area */
        .login-card {
            background: white;
            margin: -40px 25px 0;
            padding: 30px 20px;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.08);
            z-index: 10;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            font-size: 12px;
            font-weight: 600;
            color: #666;
            margin-left: 5px;
            margin-bottom: 8px;
            display: block;
        }

        .input-wrapper {
            display: flex;
            align-items: center;
            background: #f1f5f9;
            border: 2px solid transparent;
            border-radius: 15px;
            padding: 5px 15px;
            transition: all 0.3s;
        }

        .input-wrapper:focus-within {
            background: #fff;
            border-color: #06752d;
        }

        .input-wrapper i {
            color: #06752d;
            font-size: 16px;
            margin-right: 12px;
        }

        .input-wrapper input {
            border: none;
            outline: none;
            background: transparent;
            flex: 1;
            padding: 12px 0;
            font-size: 16px;
            color: #333;
            width: 100%;
        }

        /* Login Button */
        .login-btn {
            background: linear-gradient(135deg, #06752d 0%, #0a9139 100%);
            color: white;
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 15px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
            box-shadow: 0 5px 15px rgba(6, 117, 45, 0.2);
            transition: transform 0.2s;
        }

        .login-btn:active {
            transform: scale(0.97);
        }

        .footer-links {
            text-align: center;
            margin-top: 25px;
            font-size: 14px;
        }

        .footer-links a {
            color: #06752d;
            text-decoration: none;
            font-weight: 600;
        }

        .bottom-info {
            margin-top: auto;
            text-align: center;
            padding-bottom: 30px;
            color: #94a3b8;
            font-size: 12px;
        }

        @media screen and (max-width: 480px) {
            .login-container { max-width: 100%; height: 100vh; }
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="login-header">
            <div class="app-logo">
                <i class="fas fa-shield-alt"></i>
            </div>
            <h2>বন্ধু টেলিকম</h2>
            <p>আপনার একাউন্টে লগইন করুন</p>
        </div>

        <div class="login-card">
            <div class="input-group">
                <label>মোবাইল নাম্বার</label>
                <div class="input-wrapper">
                    <i class="fas fa-phone-alt"></i>
                    <input type="number" placeholder="01XXX XXXXXX">
                </div>
            </div>

            <div class="input-group">
                <label>পিন নাম্বার</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input type="password" placeholder="XXXX">
                </div>
            </div>

            <button class="login-btn" onclick="handleLogin()">লগইন করুন</button>

            <div class="footer-links">
                <p>একাউন্ট নেই? <a href="#">নতুন তৈরি করুন</a></p>
            </div>
        </div>

        <div class="bottom-info">
            &copy; 2026 Bondhu Telecom | All Rights Reserved
        </div>
    </div>

    <script>
        function handleLogin() {
            // লগইন সাকসেস হলে সরাসরি হোমে নিয়ে যাবে
            window.location.href = 'home.html';
        }
    </script>
</body>
</html>
