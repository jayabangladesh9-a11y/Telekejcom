<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login - Bondhu Telecom</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .login-container {
            width: 100%;
            max-width: 450px;
            background-color: #fff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.4s ease;
            will-change: transform, opacity;
        }

        /* Slide Animation Class */
        .slide-out {
            transform: translateX(-100%);
            opacity: 0;
            pointer-events: none;
        }

        .login-header {
            background: linear-gradient(rgba(6, 117, 45, 0.6), rgba(6, 117, 45, 0.6)), url('1.jpg');
            background-size: cover;
            background-position: center;
            height: 250px;
            padding: 30px 20px;
            color: white;
            text-align: center;
            border-bottom-left-radius: 40px;
            border-bottom-right-radius: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .app-logo {
            width: 80px;
            height: 80px;
            background: white;
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 15px;
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .app-logo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .login-header h2 {
            font-size: 22px;
            font-weight: 700;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        .login-header p {
            font-size: 13px;
            opacity: 0.95;
            margin-top: 5px;
            text-shadow: 0 1px 2px rgba(0,0,0,0.3);
        }

        .login-card {
            background: white;
            margin: -40px 25px 0;
            padding: 30px 20px;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.08);
            z-index: 10;
        }

        .input-group {
            margin-bottom: 15px;
        }

        .input-group label {
            font-size: 12px;
            font-weight: 600;
            color: #666;
            margin-left: 5px;
            margin-bottom: 8px;
            display: block;
        }

        .input-wrapper {
            display: flex;
            align-items: center;
            background: #f1f5f9;
            border: 2px solid transparent;
            border-radius: 15px;
            padding: 8px 12px;
            transition: all 0.3s;
        }

        .input-wrapper:focus-within {
            background: #fff;
            border-color: #06752d;
        }

        .icon-circle {
            width: 35px;
            height: 35px;
            background: #06752d;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-right: 12px;
            flex-shrink: 0;
        }

        .icon-circle i {
            color: white;
            font-size: 14px;
        }

        .input-wrapper input {
            border: none;
            outline: none;
            background: transparent;
            flex: 1;
            padding: 8px 0;
            font-size: 16px;
            color: #333;
            width: 100%;
        }

        .forgot-container {
            text-align: right;
            margin-top: 8px;
            margin-bottom: 20px;
        }

        .forgot-link {
            color: #06752d;
            font-size: 13px;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
        }

        .login-btn {
            background: linear-gradient(135deg, #06752d 0%, #0a9139 100%);
            color: white;
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 15px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(6, 117, 45, 0.2);
            transition: transform 0.2s;
        }

        .login-btn:active {
            transform: scale(0.97);
        }

        .footer-links {
            text-align: center;
            margin-top: 25px;
            font-size: 14px;
        }

        .footer-links a {
            color: #06752d;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
        }

        .bottom-info {
            margin-top: auto;
            text-align: center;
            padding-bottom: 30px;
            color: #94a3b8;
            font-size: 12px;
        }

        @media screen and (max-width: 480px) {
            .login-container { max-width: 100%; height: 100vh; border-radius: 0; }
        }

        @media screen and (min-width: 1025px) {
            .login-container { max-width: 450px; border-radius: 20px; height: 90vh; }
        }
    </style>
</head>
<body>

    <div class="login-container" id="loginApp">
        <div class="login-header">
            <div class="app-logo">
                <img src="3.png" alt="Bondhu Telecom Logo">
            </div>
            <h2>Bondhu Telecom</h2>
            <p>Login to your account</p>
        </div>

        <div class="login-card">
            <div class="input-group">
                <label>Mobile Number</label>
                <div class="input-wrapper">
                    <div class="icon-circle">
                        <i class="fas fa-phone-alt"></i>
                    </div>
                    <input type="number" placeholder="Enter mobile number">
                </div>
            </div>

            <div class="input-group">
                <label>PIN Number</label>
                <div class="input-wrapper">
                    <div class="icon-circle">
                        <i class="fas fa-lock"></i>
                    </div>
                    <input type="password" placeholder="Enter your pin">
                </div>
                <div class="forgot-container">
                    <a class="forgot-link" onclick="handleNavigation('forgot.html')">Forgot PIN?</a>
                </div>
            </div>

            <button class="login-btn" onclick="handleNavigation('home.html')">Login Now</button>

            <div class="footer-links">
                <p>Don't have an account? <a onclick="handleNavigation('singup.html')">Register Now</a></p>
            </div>
        </div>

        <div class="bottom-info">
            &copy; 2026 Bondhu Telecom | All Rights Reserved
        </div>
    </div>

    <script>
        function handleNavigation(targetPage) {
            const app = document.getElementById('loginApp');
            
            // স্লাইড এনিমেশন শুরু হবে
            app.classList.add('slide-out');
            
            // এনিমেশন শেষ হলে পেজ পরিবর্তন হবে
            setTimeout(() => {
                window.location.href = targetPage;
            }, 500);
        }
    </script>
</body>
</html>
